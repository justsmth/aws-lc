name: Windows Alternative Compilers
on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
env:
  AWS_LC_SSL_TEST_RUNNER_PEEK_ROUNDS: 5
permissions:
  contents: read

jobs:
  mingw:
    if: github.repository_owner == 'aws'
    runs-on: windows-latest
    steps:
      - name: Install NASM
        uses: ilammy/setup-nasm@v1.5.1
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "path has spaces/aws-lc"
      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2.2.0
        id: setup_mingw
        with:
          static: 0
      - name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          generator: Ninja
          source-dir: 'path has spaces/aws-lc'
          build-dir: 'path has spaces/build'
          c-compiler: ${{ steps.setup_mingw.outputs.gcc }}
          cxx-compiler: ${{ steps.setup_mingw.outputs.gxx }}
          options: |
            CMAKE_SYSTEM_NAME=Windows \
            CMAKE_SYSTEM_PROCESSOR=x86_64 \
            CMAKE_BUILD_TOOL=C:/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin/ninja.exe \
            CMAKE_FIND_ROOT_PATH=C:/ProgramData/chocolatey/lib/mingw/tools/install/mingw64 \
            CMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            CMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            CMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            CMAKE_BUILD_TYPE=Release \
      - name: Build Project
        run: cmake --build "path has spaces/build" --target all
      - name: Run tests
        run: cmake --build "path has spaces/build" --target run_tests
  clang:
    if: github.repository_owner == 'aws'
    runs-on: windows-latest
    steps:
      - name: Install NASM
        uses: ilammy/setup-nasm@v1.5.1
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        id: clang
        with:
          version: 19
          env: true
      - name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          generator: Ninja
          c-compiler: "C:/Program Files/LLVM/bin/clang.exe"
          cxx-compiler: "C:/Program Files/LLVM/bin/clang++.exe"
          options: |
            CMAKE_SYSTEM_NAME=Windows \
            CMAKE_SYSTEM_PROCESSOR=x86_64 \
            CMAKE_BUILD_TYPE=Release \
      - name: Build Project
        run: cmake --build ./build --target all
      - name: Run tests
        run: cmake --build ./build --target run_tests
  clang-cl-msbuild:
    if: github.repository_owner == 'aws'
    strategy:
      fail-fast: false
      matrix:
        target:
          - x64
          - x64_arm64
    runs-on: windows-latest
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      CMAKE_GENERATOR_TOOLSET: "ClangCL,host=x64"
    steps:
      - if: ${{ matrix.target  == 'x64' }}
        name: Install NASM
        uses: ilammy/setup-nasm@v1.5.1
      - name: Checkout
        uses: actions/checkout@v4
      - uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.target }}
      - if: ${{ matrix.target  == 'x64' }}
        name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          options: |
            CMAKE_BUILD_TYPE=Release \
      - if: ${{ matrix.target  == 'x64_arm64' }}
        name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          options: |
            CMAKE_GENERATOR_PLATFORM=ARM64 \
            CMAKE_SYSTEM_NAME=Windows \
            CMAKE_SYSTEM_PROCESSOR=ARM64 \
            CMAKE_BUILD_TYPE=Release \
      - name: Build Project
        run: cmake --build ./build --target all_tests
      - if: ${{ matrix.target  == 'x64' }}
        name: Run tests
        run: cmake --build ./build --target run_tests
  clang-cl-ninja:
    if: github.repository_owner == 'aws'
    strategy:
      fail-fast: false
      matrix:
        target:
          - x64
          - x64_arm64
    runs-on: windows-latest
    steps:
      - if: ${{ matrix.target  == 'x64' }}
        name: Install NASM
        uses: ilammy/setup-nasm@v1.5.1
      - name: Remove wrong clang-cl.exe
        run:  rm "C:/Program Files/LLVM/bin/clang-cl.exe"
      - name: Checkout
        uses: actions/checkout@v4
      - uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.target }}
      - if: ${{ matrix.target  == 'x64' }}
        name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          generator: Ninja
          c-compiler: clang-cl
          cxx-compiler: clang-cl
          options: |
            CMAKE_BUILD_TYPE=Release \
      - if: ${{ matrix.target  == 'x64_arm64' }}
        name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          generator: Ninja
          c-compiler: clang-cl
          cxx-compiler: clang-cl
          options: |
            CMAKE_SYSTEM_NAME=Windows \
            CMAKE_SYSTEM_PROCESSOR=ARM64 \
            CMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc \
            CMAKE_ASM_COMPILER_TARGET=arm64-pc-windows-msvc \
            CMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc \
            CMAKE_BUILD_TYPE=Release \
      - name: Build Project
        run: cmake --build ./build --target all
      - if: ${{ matrix.target  == 'x64' }}
        name: Run tests
        run: cmake --build ./build --target run_tests
  cross-mingw:
    if: github.repository_owner == 'aws'
    runs-on: ubuntu-22.04
    steps:
      - name: Install Tools
        run: |
          set -ex
          sudo apt-get update -o Acquire::Languages=none -o Acquire::Translation=none
          sudo apt-get install --assume-yes --no-install-recommends  software-properties-common
          sudo add-apt-repository --yes ppa:longsleep/golang-backports
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/jammy/winehq-jammy.sources
          sudo apt-get update -o Acquire::Languages=none -o Acquire::Translation=none
          sudo apt-get install --assume-yes --no-install-recommends build-essential cmake golang-go nasm clang wget mingw-w64
          sudo apt-get install --assume-yes --install-recommends winehq-stable wine-binfmt
          sudo update-binfmts --display
          sudo update-binfmts --disable
          sudo update-binfmts --enable wine
          sudo update-binfmts --display
          sudo rm -rf /tmp/*
      - uses: actions/checkout@v4
      - name: x86_64-w64-mingw32 Build/Test
        run:
          ./tests/ci/run_cross_mingw_tests.sh x86_64 w64-mingw32 "-DCMAKE_BUILD_TYPE=Release"
  msys2:
    name: msys2 ${{ matrix.sys }} - ${{ matrix.generator }}
    if: github.repository_owner == 'aws'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        sys:
          - mingw64
          - ucrt64
          - clang64
        generator:
          - 'Ninja'
          - 'MinGW Makefiles'
          - 'MSYS Makefiles'
    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        id: setup_msys2
        with:
          msystem: ${{ matrix.sys }}
          update: true
          pacboy: >-
            cmake
            toolchain
            llvm
            rust
            rust-bindgen
            ninja
            cc
            go
            nasm
      - name: Update Environment
        shell: bash
        run: |
          SYSROOT=$(cygpath -a -m '${{ steps.setup_msys2.outputs.msys2-location }}\${{ matrix.sys }}')
          echo "GOPATH=${SYSROOT}" >> $GITHUB_ENV
          echo "GOROOT=${SYSROOT}/lib/go" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=${{ matrix.generator }}" >> $GITHUB_ENV
          cygpath -m ${SYSROOT}/bin >> $GITHUB_PATH
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup CMake
        uses: threeal/cmake-action@v1.3.0
        with:
          build-dir: ./build
          options: |
            CMAKE_SYSTEM_NAME=Windows \
            CMAKE_SYSTEM_PROCESSOR=x86_64 \
            CMAKE_FIND_ROOT_PATH='${{ steps.setup_msys2.outputs.msys2-location }}\${{ matrix.sys }}\' \
            CMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            CMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            CMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            CMAKE_BUILD_TYPE=Release \
      - name: Run tests
        shell: 'msys2 {0}'
        run: cmake --build ./build --target run_tests
  cross-clang-cl-windows:
    if: github.repository_owner == 'aws'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        fips:
          - "0"
          - "1"
    env:
      XWIN_DIR: /opt/xwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: ">=1.18"
      - name: Install tools
        run: |
          set -ex
          sudo apt-get update -o Acquire::Languages=none -o Acquire::Translation=none
          sudo apt-get install --assume-yes --no-install-recommends \
            cmake ninja-build nasm cargo wine64 \
            wget lsb-release software-properties-common gnupg
          # Install Clang 19 from the official LLVM apt repository
          # (xwin's MSVC STL headers require Clang 19+; Ubuntu 24.04 ships Clang 18)
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 19
          # Create MSVC-compatible symlinks (these tools check argv[0] to select mode)
          sudo ln -sf /usr/bin/clang-19 /usr/local/bin/clang-cl
          sudo ln -sf /usr/bin/lld-19 /usr/local/bin/lld-link
          sudo ln -sf /usr/bin/llvm-ar-19 /usr/local/bin/llvm-lib
          sudo ln -sf /usr/bin/llvm-rc-19 /usr/local/bin/llvm-rc
          sudo ln -sf /usr/bin/llvm-mt-19 /usr/local/bin/llvm-mt
          # Install xwin to download MSVC SDK/CRT headers and libraries
          cargo install xwin --locked
          xwin --accept-license splat --output ${XWIN_DIR}
          # Enable Wine binfmt for running .exe at build time (needed for FIPS capture_hash)
          sudo dpkg --add-architecture i386
          sudo apt-get install --assume-yes binfmt-support wine-binfmt
          sudo update-binfmts --enable wine
      - name: Configure CMake toolchain
        run: |
          cat > /tmp/clang-cl-cross.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR AMD64)
          set(CMAKE_C_COMPILER clang-cl)
          set(CMAKE_CXX_COMPILER clang-cl)
          set(CMAKE_LINKER lld-link)
          set(CMAKE_AR llvm-lib)
          set(CMAKE_RC_COMPILER llvm-rc)
          set(CMAKE_MT llvm-mt)
          set(CMAKE_MSVC_RUNTIME_LIBRARY "MultiThreadedDLL")
          set(CMAKE_C_FLAGS_INIT "--target=x86_64-pc-windows-msvc /imsvc $ENV{XWIN_DIR}/crt/include /imsvc $ENV{XWIN_DIR}/sdk/include/ucrt /imsvc $ENV{XWIN_DIR}/sdk/include/um /imsvc $ENV{XWIN_DIR}/sdk/include/shared")
          set(CMAKE_CXX_FLAGS_INIT "${CMAKE_C_FLAGS_INIT}")
          set(CMAKE_EXE_LINKER_FLAGS_INIT "/libpath:$ENV{XWIN_DIR}/crt/lib/x86_64 /libpath:$ENV{XWIN_DIR}/sdk/lib/ucrt/x86_64 /libpath:$ENV{XWIN_DIR}/sdk/lib/um/x86_64")
          set(CMAKE_SHARED_LINKER_FLAGS_INIT "${CMAKE_EXE_LINKER_FLAGS_INIT}")
          set(CMAKE_MODULE_LINKER_FLAGS_INIT "${CMAKE_EXE_LINKER_FLAGS_INIT}")
          EOF
      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/clang-cl-cross.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=${{ matrix.fips == '1' && '1' || '0' }} \
            -DFIPS=${{ matrix.fips }}
          cmake --build build
      - name: Run tests (via Wine)
        if: matrix.fips == '0'
        run: |
          export WINEPATH="$(winepath -w build/crypto);$(winepath -w build/ssl)"
          cmake --build build --target run_tests
